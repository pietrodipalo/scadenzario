<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scadenzario — Digital Education</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0f14;--surface:#161a23;--surface2:#1e2433;--border:#252c3d;
  --accent:#4f8ef7;--green:#22c97a;--yellow:#f5a623;--red:#f74f5e;--purple:#b06ef7;
  --text:#e8eaf0;--text2:#8b92a8;--text3:#4e566e;
  --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;min-height:100vh}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{font-size:13px;font-family:var(--mono);color:var(--text2)}
.logo span{color:var(--accent);font-weight:500}
.header-right{display:flex;align-items:center;gap:10px}
.today-badge{font-family:var(--mono);font-size:11px;color:var(--text3);background:var(--surface2);padding:4px 10px;border-radius:4px;border:1px solid var(--border)}
.sync-status{font-family:var(--mono);font-size:11px;padding:4px 10px;border-radius:4px;border:1px solid var(--border);display:flex;align-items:center;gap:6px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--text3)}
.sync-dot.ok{background:var(--green)}
.sync-dot.syncing{background:var(--yellow);animation:pulse 1s infinite}
.sync-dot.error{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.import-btn{background:var(--accent);border:none;border-radius:6px;color:#fff;font-family:var(--font);font-size:13px;font-weight:500;padding:7px 16px;cursor:pointer;display:flex;align-items:center;gap:7px}
.import-btn:hover{background:#3a7de8}
.export-btn{background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text2);font-family:var(--font);font-size:13px;font-weight:500;padding:7px 16px;cursor:pointer;transition:all .15s}
.export-btn:hover{background:var(--border);color:var(--text)}
.month-cb-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:20px}
.month-cb-item{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;cursor:pointer;transition:all .15s}
.month-cb-item:hover{border-color:var(--accent)}
.month-cb-item input{accent-color:var(--accent);cursor:pointer}
.month-cb-item label{font-size:12px;font-family:var(--mono);color:var(--text2);cursor:pointer}
.format-row{display:flex;gap:10px;margin-bottom:20px}
.format-btn{flex:1;padding:12px;border:1px solid var(--border);border-radius:6px;background:var(--surface2);color:var(--text2);font-family:var(--font);font-size:13px;cursor:pointer;text-align:center;transition:all .15s}
.format-btn:hover{border-color:var(--accent);color:var(--accent)}
.format-btn.selected{border-color:var(--accent);background:rgba(79,142,247,.1);color:var(--accent)}
.export-section-label{font-size:11px;font-family:var(--mono);color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.import-btn input{display:none}
.layout{display:grid;grid-template-columns:240px 1fr;height:calc(100vh - 53px)}
.sidebar{background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;padding:16px 0}
.sidebar-section{padding:0 16px 6px;font-size:10px;font-family:var(--mono);color:var(--text3);letter-spacing:.12em;text-transform:uppercase;margin-top:16px}
.sidebar-section:first-child{margin-top:0}
.nav-item{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;cursor:pointer;border-left:2px solid transparent;transition:all .15s}
.nav-item:hover{background:var(--surface2)}
.nav-item.active{border-left-color:var(--accent);background:var(--surface2);color:var(--accent)}
.nav-label{font-size:13px}
.nav-badge{font-family:var(--mono);font-size:11px;padding:2px 6px;border-radius:3px;font-weight:500}
.badge-red{background:rgba(247,79,94,.15);color:var(--red)}
.badge-yellow{background:rgba(245,166,35,.15);color:var(--yellow)}
.badge-green{background:rgba(34,201,122,.15);color:var(--green)}
.badge-blue{background:rgba(79,142,247,.15);color:var(--accent)}
.badge-purple{background:rgba(176,110,247,.15);color:var(--purple)}
.badge-gray{background:var(--surface2);color:var(--text2)}
.main{overflow-y:auto;padding:24px 28px}
.kpi-bar{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:24px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px 16px}
.kpi-label{font-size:10px;font-family:var(--mono);color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px}
.kpi-value{font-size:20px;font-weight:600;letter-spacing:-.02em}
.kpi-sub{font-size:11px;color:var(--text2);margin-top:3px}
.kpi-red .kpi-value{color:var(--red)}.kpi-yellow .kpi-value{color:var(--yellow)}
.kpi-green .kpi-value{color:var(--green)}.kpi-blue .kpi-value{color:var(--accent)}.kpi-purple .kpi-value{color:var(--purple)}
.search-bar{display:flex;gap:10px;margin-bottom:20px}
.search-input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:9px 14px;color:var(--text);font-family:var(--font);font-size:13px;outline:none;transition:border .15s}
.search-input:focus{border-color:var(--accent)}
.search-input::placeholder{color:var(--text3)}
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:16px}
table{width:100%;border-collapse:collapse}
thead th{padding:9px 12px;text-align:left;font-size:10px;font-family:var(--mono);color:var(--text3);text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid var(--border);background:var(--surface2);white-space:nowrap}
tbody tr{border-bottom:1px solid var(--border);transition:background .12s;cursor:pointer}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--surface2)}
tbody td{padding:10px 12px;font-size:13px;color:var(--text2);vertical-align:middle}
td.td-name{color:var(--text);font-weight:500}
td.td-name:hover{color:var(--accent);text-decoration:underline}
td.td-amount{font-family:var(--mono);color:var(--text);text-align:right}
td.td-date{font-family:var(--mono);font-size:12px}
.sel-sollecito{background:var(--surface2);border:1px solid var(--border);border-radius:4px;color:var(--text2);font-family:var(--mono);font-size:11px;padding:3px 7px;cursor:pointer;outline:none;transition:all .15s}
.sel-sollecito.da-sollecitare{border-color:var(--yellow);color:var(--yellow);background:rgba(245,166,35,.08)}
.sel-sollecito.sollecitato{border-color:var(--green);color:var(--green);background:rgba(34,201,122,.08)}
.legale-wrap{display:flex;align-items:center;gap:6px;cursor:pointer}
.legale-cb{width:15px;height:15px;accent-color:var(--purple);cursor:pointer}
.legale-label{font-size:11px;font-family:var(--mono);color:var(--text3)}
.legale-label.active{color:var(--purple)}
.pay-btn{background:none;border:1px solid var(--border);border-radius:4px;color:var(--text3);font-size:11px;padding:3px 8px;cursor:pointer;font-family:var(--mono);transition:all .15s;white-space:nowrap}
.pay-btn:hover{border-color:var(--green);color:var(--green)}
.pay-btn.paid{border-color:var(--green);color:var(--green);background:rgba(34,201,122,.08)}
.paid-row{opacity:.4}
.paid-row td.td-name{text-decoration:line-through}
.section-title{font-size:16px;font-weight:600;margin-bottom:16px}
.section-header{display:flex;align-items:baseline;gap:16px;margin-bottom:16px}
.section-total{font-family:var(--mono);font-size:14px}
.month-group-header{padding:18px 0 8px;font-size:10px;font-family:var(--mono);color:var(--text3);text-transform:uppercase;letter-spacing:.1em;display:flex;align-items:center;gap:10px}
.month-group-header::after{content:'';flex:1;height:1px;background:var(--border)}
.month-total{color:var(--text2);font-size:12px}
.empty{text-align:center;padding:48px 24px;color:var(--text3)}
.empty-icon{font-size:32px;margin-bottom:10px}
.loading{text-align:center;padding:48px 24px;color:var(--text3);font-family:var(--mono);font-size:13px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:200;display:none;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;width:700px;max-width:95vw;max-height:88vh;overflow:hidden;display:flex;flex-direction:column}
.modal-head{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:16px;font-weight:600}
.modal-close{background:none;border:none;color:var(--text3);cursor:pointer;font-size:22px;line-height:1;padding:2px 6px;border-radius:4px}
.modal-close:hover{background:var(--surface2);color:var(--text)}
.modal-body{padding:20px 22px;overflow-y:auto;flex:1}
.modal-kpi-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:18px}
.modal-kpi{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:12px 14px}
.modal-kpi-label{font-size:10px;font-family:var(--mono);color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
.modal-kpi-value{font-size:18px;font-weight:600}
.merge-modal{width:760px}
.merge-section{margin-bottom:20px}
.merge-section-title{font-size:12px;font-family:var(--mono);color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.merge-badge{font-size:11px;padding:2px 8px;border-radius:3px;font-family:var(--mono)}
.merge-row{display:flex;align-items:center;padding:8px 12px;border-radius:6px;margin-bottom:4px;font-size:13px;gap:12px}
.merge-new{background:rgba(34,201,122,.08);border:1px solid rgba(34,201,122,.2)}
.merge-updated{background:rgba(79,142,247,.08);border:1px solid rgba(79,142,247,.2)}
.merge-removed{background:rgba(247,79,94,.08);border:1px solid rgba(247,79,94,.2)}
.merge-row .mr-client{flex:1;font-weight:500;color:var(--text)}
.merge-row .mr-detail{font-family:var(--mono);font-size:11px;color:var(--text2)}
.merge-row .mr-tag{font-family:var(--mono);font-size:10px;padding:2px 6px;border-radius:3px}
.tag-new{background:rgba(34,201,122,.15);color:var(--green)}
.tag-upd{background:rgba(79,142,247,.15);color:var(--accent)}
.tag-rem{background:rgba(247,79,94,.15);color:var(--red)}
.merge-empty{color:var(--text3);font-size:12px;font-family:var(--mono);padding:8px 12px}
.btn-row{display:flex;gap:10px;margin-top:20px}
.btn{border-radius:6px;padding:9px 18px;font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border);transition:all .15s}
.btn-confirm{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-confirm:hover{background:#3a7de8}
.btn-cancel{background:var(--surface2);color:var(--text2)}
.btn-cancel:hover{background:var(--border);color:var(--text)}
.login-overlay{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;align-items:center;justify-content:center}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:40px;width:340px;text-align:center}
.login-logo{font-size:13px;font-family:var(--mono);color:var(--text2);margin-bottom:8px}
.login-logo span{color:var(--accent)}
.login-title{font-size:20px;font-weight:600;margin-bottom:6px}
.login-sub{font-size:13px;color:var(--text3);margin-bottom:28px}
.login-btn{width:100%;padding:12px;border:1px solid var(--border);border-radius:8px;background:var(--surface2);color:var(--text);font-family:var(--font);font-size:14px;font-weight:500;cursor:pointer;margin-bottom:10px;transition:all .15s;text-align:left;display:flex;align-items:center;gap:12px}
.login-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(79,142,247,.08)}
.login-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;flex-shrink:0}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>

      <button class="modal-close" id="exportCloseBtn">&#x00D7;</button>
    </div>
    <div class="modal-body" id="exportBody"></div>
  </div>
</div>

<div class="modal-overlay" id="mergeOverlay">

    <div class="modal-body" id="mergeBody"></div>
  </div>
</div>

<script>
var API_URL = "https://script.google.com/a/macros/istitutojanus.it/s/AKfycbwYAUv-S8Fk5c_KGexPLwtcOh3dVuDC__bbTiVWPpVxBsCargYf8MFMGiwPlkur7RJz/exec";
var BASE_DATA = JSON.parse(document.getElementById('jsonData').textContent);
var TODAY = new Date().toISOString().split('T')[0];
var TODAY_D = new Date(TODAY);

// ── STATO IN MEMORIA (sincronizzato con Google Sheets) ─────────
var man = {
  paidSet:   {},   // key -> true
  sollecito: {},   // key -> 'da-sollecitare'|'sollecitato'
  legaleSet: {},   // key -> true
  note:      {},   // key -> testo libero
  extraRecords: null
};
var RECORDS = BASE_DATA;
var syncPending = {};  // key -> {sheet, key, valore} in attesa

// ── SYNC CON GOOGLE SHEETS ────────────────────────────────────
function setSyncStatus(state, text){
  var dot = document.getElementById('syncDot');
  var txt = document.getElementById('syncText');
  dot.className = 'sync-dot ' + state;
  txt.textContent = text;
}

function loadFromSheets(callback){
  setSyncStatus('syncing','Sincronizzazione...');
  var sheets = ['sollecito','legale','pagati','note'];
  var results = {};
  var done = 0;
  var failed = false;
  sheets.forEach(function(sheet){
    fetch(API_URL + '?action=read&sheet=' + sheet)
      .then(function(r){ return r.json(); })
      .then(function(rows){
        results[sheet] = rows;
        done++;
        if(done === sheets.length) applyFromSheets(results, callback);
      })
      .catch(function(err){
        if(!failed){
          failed = true;
          setSyncStatus('error','Offline - dati locali');
          if(callback) callback();
        }
      });
  });
}

function applyFromSheets(results, callback){
  // Reset
  man.paidSet = {};
  man.sollecito = {};
  man.legaleSet = {};

  // Sollecito
  (results.sollecito||[]).forEach(function(row){
    if(row.key && row.valore) man.sollecito[row.key] = row.valore;
  });
  // Legale
  (results.legale||[]).forEach(function(row){
    if(row.key && (row.valore === 'true' || row.valore === true)) man.legaleSet[row.key] = true;
  });
  // Pagati
  (results.pagati||[]).forEach(function(row){
    if(row.key && (row.valore === 'true' || row.valore === true)) man.paidSet[row.key] = true;
  });

  // Records: usa localStorage se disponibile (aggiornato dopo ogni import)
  var localRec = loadLocalRecords();
  if(localRec && localRec.length > 0){
    RECORDS = localRec;
  }

  // Note
  man.note = {};
  (results.note||[]).forEach(function(row){
    if(row.key && row.valore) man.note[row.key] = String(row.valore);
  });

  // Imposta da-sollecitare SOLO su insoluti che non hanno MAI avuto uno stato su Sheets
  // (man.sollecito è già popolato da Sheets - non sovrascrivere mai chi ha già un valore)
  var toInit = [];
  RECORDS.forEach(function(r){
    if(r.data <= TODAY){
      var k = rKey(r);
      if(!man.sollecito[k]){
        man.sollecito[k] = 'da-sollecitare';
        toInit.push(k);
      }
    }
  });
  // Salva su Sheets solo i nuovi (in sequenza per non sovraccaricare)
  var idx = 0;
  function saveNext(){
    if(idx >= toInit.length) return;
    var k = toInit[idx++];
    var url = API_URL + '?action=write&sheet=sollecito&key=' + encodeURIComponent(k) + '&valore=da-sollecitare';
    fetch(url).then(function(){ saveNext(); }).catch(function(){ saveNext(); });
  }
  if(toInit.length > 0) saveNext();

  setSyncStatus('ok', 'Sincronizzato');
  if(callback) callback();
}

function saveToSheet(sheet, key, valore){
  setSyncStatus('syncing','Salvataggio...');
  var url = API_URL + '?action=write&sheet=' + encodeURIComponent(sheet) + '&key=' + encodeURIComponent(key) + '&valore=' + encodeURIComponent(valore);
  fetch(url)
    .then(function(r){ return r.json(); })
    .then(function(res){
      if(res.error) setSyncStatus('error','Errore: '+res.error);
      else setSyncStatus('ok','Sincronizzato');
    })
    .catch(function(err){ setSyncStatus('error','Errore salvataggio'); });
}

// ── HELPERS ───────────────────────────────────────────────────
function rKey(r){ return r.cliente+'||'+r.fattura+'||'+r.data; }
function isPaid(r){ return !!man.paidSet[rKey(r)]; }
function getSollecito(r){ return man.sollecito[rKey(r)] || ''; }
function isLegale(r){ return !!man.legaleSet[rKey(r)]; }
function daysDiff(d){ return Math.round((TODAY_D-new Date(d))/(864e5)); }
function fmtDate(s){ var p=s.split('-'); return p[2]+'/'+p[1]+'/'+p[0]; }
function fmtEur(n){ return '€ '+n.toLocaleString('it-IT',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function monthLabel(mese){ var p=mese.split('-'); return new Date(p[0],p[1]-1,1).toLocaleDateString('it-IT',{month:'long',year:'numeric'}); }
function statusBadge(d){ if(d>TODAY)return{cls:'badge-blue',label:'futuro'}; var g=daysDiff(d); if(g===0)return{cls:'badge-yellow',label:'oggi'}; if(g<=30)return{cls:'badge-yellow',label:g+'gg'}; return{cls:'badge-red',label:g+'gg'}; }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── AZIONI ────────────────────────────────────────────────────
function togglePaid(key, val){
  if(val) man.paidSet[key]=true; else delete man.paidSet[key];
  saveToSheet('pagati', key, val?'true':'false');
  renderMain(); renderSidebar();
}
function saveRecordsToSheet(records){
  // Salva records in localStorage - persistono per questo utente
  // I dati manuali (sollecito/legale/note) sono su Sheets e condivisi
  try {
    localStorage.setItem('scad_records', JSON.stringify(records));
    localStorage.setItem('scad_records_ts', new Date().toISOString());
    setSyncStatus('ok','Sincronizzato');
  } catch(e) {
    setSyncStatus('error','Errore salvataggio locale');
  }
}

function loadLocalRecords(){
  try {
    var stored = localStorage.getItem('scad_records');
    if(stored) {
      var parsed = JSON.parse(stored);
      if(parsed && parsed.length > 0) return parsed;
    }
  } catch(e) {}
  return null;
}

function setSollecito(key, val){
  man.sollecito[key] = val;
  saveToSheet('sollecito', key, val);
  renderSidebar();
  document.querySelectorAll('.sel-sollecito[data-key="'+key+'"]').forEach(function(el){el.value=val;el.className='sel-sollecito '+val;});
}
function setNote(key, val){
  if(val && val.trim()) man.note[key] = val.trim();
  else delete man.note[key];
  saveToSheet('note', key, val ? val.trim() : '');
}
function toggleLegale(key, val){
  if(val) man.legaleSet[key]=true; else delete man.legaleSet[key];
  saveToSheet('legale', key, val?'true':'false');
  renderSidebar();
  document.querySelectorAll('.legale-cb[data-key="'+key+'"]').forEach(function(cb){cb.checked=val;var l=cb.nextElementSibling;if(l)l.className='legale-label'+(val?' active':'');});
}

// ── MERGE XLS ─────────────────────────────────────────────────
function parseXLS(file, callback){
  var reader = new FileReader();
  reader.onload = function(e){
    try{
      var wb=XLSX.read(e.target.result,{type:'array',cellDates:true});
      var ws=wb.Sheets[wb.SheetNames[0]];
      var raw=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
      var headerRow=-1;
      for(var i=0;i<raw.length;i++){var row=raw[i].map(function(c){return String(c).toLowerCase();});if(row.some(function(c){return c.includes('cliente');})&&row.some(function(c){return c.includes('data');})){headerRow=i;break;}}
      if(headerRow===-1){alert('Formato XLS non riconosciuto.');return;}
      var headers=raw[headerRow].map(function(c){return String(c).trim().toLowerCase();});
      var iData=headers.findIndex(function(h){return h.includes('data');});
      var iTipo=headers.findIndex(function(h){return h.includes('tipo');});
      var iCliente=headers.findIndex(function(h){return h.includes('cliente');});
      var iCredito=headers.findIndex(function(h){return h.includes('credito');});
      var iDesc=headers.findIndex(function(h){return h.includes('descri');});
      var records=[];var re=/fattura nr\.\s*(\S+)/i;
      for(var j=headerRow+1;j<raw.length;j++){
        var row2=raw[j];var credito=parseFloat(String(row2[iCredito]).replace(',','.'))||0;if(credito<=0)continue;
        var tipo=iTipo>=0?String(row2[iTipo]||'').trim().toLowerCase():'fattura';if(tipo&&tipo!=='fattura')continue;
        var dataVal=row2[iData];var dataStr='';
        if(dataVal instanceof Date){var dy=dataVal.getFullYear();var dm=String(dataVal.getMonth()+1).padStart(2,'0');var dd=String(dataVal.getDate()).padStart(2,'0');dataStr=dy+'-'+dm+'-'+dd;}
        else{var s=String(dataVal).trim();var parts=s.split('/');if(parts.length===3)dataStr=parts[2]+'-'+parts[1].padStart(2,'0')+'-'+parts[0].padStart(2,'0');else dataStr=s;}
        var desc=String(row2[iDesc]||'');var m=re.exec(desc);var fattura=m?m[1]:'';var cliente=String(row2[iCliente]||'').trim();
        if(!cliente||!dataStr)continue;
        records.push({data:dataStr,mese:dataStr.slice(0,7),cliente:cliente,importo:credito,fattura:fattura,descrizione:desc});
      }
      callback(records);
    }catch(err){alert('Errore parsing XLS: '+err.message);}
  };
  reader.readAsArrayBuffer(file);
}

function computeMerge(newRecs){
  var oldMap={};RECORDS.forEach(function(r){oldMap[rKey(r)]=r;});
  var newMap={};newRecs.forEach(function(r){newMap[rKey(r)]=r;});
  var added=[],updated=[],removed=[];
  newRecs.forEach(function(r){var k=rKey(r);if(!oldMap[k])added.push(r);else if(Math.abs(oldMap[k].importo-r.importo)>0.001)updated.push({old:oldMap[k],nw:r});});
  RECORDS.forEach(function(r){if(!newMap[rKey(r)])removed.push(r);});
  return{added:added,updated:updated,removed:removed};
}

function applyMerge(newRecs, diff){
  RECORDS = newRecs;
  diff.removed.forEach(function(r){var k=rKey(r);delete man.paidSet[k];delete man.legaleSet[k];delete man.sollecito[k];});
  RECORDS.forEach(function(r){if(r.data<=TODAY){var k=rKey(r);if(!man.sollecito[k]){man.sollecito[k]='da-sollecitare';saveToSheet('sollecito',k,'da-sollecitare');}}});
  saveRecordsToSheet(RECORDS);
}

function handleFileImport(input){
  var file=input.files[0];if(!file)return;input.value='';
  parseXLS(file,function(newRecs){pendingImport={newRecs:newRecs,diff:computeMerge(newRecs)};showMergeModal(pendingImport.diff);});
}

  });

  h += '<div class="format-row">';
  h += '<div class="format-btn selected" id="fmtPdf" data-fmt="pdf">&#x1F4C4; PDF<br><span style="font-size:11px;color:var(--text3)">Per stampa e legale</span></div>';
  h += '<div class="format-btn" id="fmtXls" data-fmt="xlsx">&#x1F4CA; Excel<br><span style="font-size:11px;color:var(--text3)">Per elaborazioni</span></div>';

function selectAllMonths(val){
  document.querySelectorAll('#exportBody input[type=checkbox]').forEach(function(cb){ cb.checked = val; });
}

function selectFormat(fmt){
  exportFormat = fmt;
  document.getElementById('fmtPdf').className = 'format-btn' + (fmt==='pdf'?' selected':'');
  document.getElementById('fmtXls').className = 'format-btn' + (fmt==='xlsx'?' selected':'');
}

function closeExportModal(){
  document.getElementById('exportOverlay').classList.remove('open');
}

function getSelectedMonths(){
  var selected = [];
  document.querySelectorAll('#exportBody input[type=checkbox]:checked').forEach(function(cb){ selected.push(cb.value); });
  return selected;
}

function doExport(){
  var months = getSelectedMonths();
  if(!months.length){ alert('Seleziona almeno un mese.'); return; }
  var ins = getInsoluti().filter(function(r){ return months.indexOf(r.mese) !== -1; });
  ins.sort(function(a,b){ return a.mese.localeCompare(b.mese) || a.cliente.localeCompare(b.cliente); });
  if(exportFormat === 'pdf') exportPDF(ins, months);
  else exportXLSX(ins, months);
}

function exportPDF(records, months){
  var totale = records.reduce(function(a,r){ return a+r.importo; }, 0);
  var byM = {};
  records.forEach(function(r){ if(!byM[r.mese])byM[r.mese]=[]; byM[r.mese].push(r); });
  
  var rows = '';
  Object.keys(byM).sort().forEach(function(m){
    var p=m.split('-');
    var lbl=new Date(p[0],p[1]-1,1).toLocaleDateString('it-IT',{month:'long',year:'numeric'}).toUpperCase();
    var mTot = byM[m].reduce(function(a,r){return a+r.importo;},0);
    rows += '<tr style="background:#f0f4ff"><td colspan="4" style="padding:10px 12px;font-weight:700;font-size:12px;color:#1a237e;letter-spacing:.06em">'+lbl+'</td><td style="padding:10px 12px;text-align:right;font-weight:700;font-size:12px;color:#1a237e">'+fmtEur(mTot)+'</td></tr>';
    byM[m].forEach(function(r){
      var days = daysDiff(r.data);
      var sol = getSollecito(r);
      var leg = isLegale(r);
      rows += '<tr style="border-bottom:1px solid #e8eaf0">'+
        '<td style="padding:9px 12px">'+esc(r.cliente)+(leg?' <span style="color:#7c4dff;font-size:10px;font-weight:600">[LEGALE]</span>':'')+'</td>'+
        '<td style="padding:9px 12px;font-family:monospace;font-size:12px">'+fmtDate(r.data)+'</td>'+
        '<td style="padding:9px 12px;font-size:12px;color:#666">'+esc(r.fattura||'-')+'</td>'+
        '<td style="padding:9px 12px"><span style="background:'+(days>30?'#ffebee':'#fff8e1')+';color:'+(days>30?'#c62828':'#f57f17')+';padding:2px 8px;border-radius:3px;font-size:11px;font-family:monospace">'+days+'gg</span></td>'+
        '<td style="padding:9px 12px;text-align:right;font-family:monospace;font-weight:600">'+fmtEur(r.importo)+'</td>'+
      '</tr>';
    });
  });

  var today = new Date().toLocaleDateString('it-IT',{day:'numeric',month:'long',year:'numeric'});
  var win = window.open('','_blank');
  win.document.write('<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Insoluti - Digital Education</title>'+
    '<style>body{font-family:Arial,sans-serif;margin:0;padding:32px;color:#1a1a2e}'+
    'h1{font-size:22px;color:#1a237e;margin-bottom:4px}'+
    '.subtitle{font-size:13px;color:#666;margin-bottom:24px}'+
    'table{width:100%;border-collapse:collapse;font-size:13px}'+
    'thead th{background:#1a237e;color:#fff;padding:10px 12px;text-align:left;font-size:11px;letter-spacing:.06em}'+
    'thead th:last-child{text-align:right}'+
    '.totale-row{background:#e8eaf6;font-weight:700;font-size:14px}'+
    '.totale-row td{padding:12px;border-top:2px solid #1a237e}'+
    '@media print{button{display:none}}'+
    '</style></head><body>'+
    '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px">'+
    '<div><h1>Insoluti — Digital Education</h1><div class="subtitle">Estratto al '+today+' &nbsp;|&nbsp; '+records.length+' rate</div></div>'+
    '<button onclick="window.print()" style="background:#1a237e;color:#fff;border:none;padding:10px 20px;border-radius:6px;cursor:pointer;font-size:13px">&#x1F5A8; Stampa / Salva PDF</button>'+
    '</div>'+
    '<table><thead><tr><th>Cliente</th><th>Scadenza</th><th>Fattura</th><th>Ritardo</th><th style="text-align:right">Importo</th></tr></thead>'+
    '<tbody>'+rows+
    '<tr class="totale-row"><td colspan="4">TOTALE INSOLUTO</td><td style="text-align:right">'+fmtEur(totale)+'</td></tr>'+
    '</tbody></table></body></html>');

function exportXLSX(records, months){
  var rows = [['Cliente','Scadenza','Fattura','Ritardo (gg)','Sollecito','Legale','Importo (EUR)']];
  var byM = {};
  records.forEach(function(r){ if(!byM[r.mese])byM[r.mese]=[]; byM[r.mese].push(r); });
  Object.keys(byM).sort().forEach(function(m){
    var p=m.split('-');
    var lbl=new Date(p[0],p[1]-1,1).toLocaleDateString('it-IT',{month:'long',year:'numeric'});
    rows.push([lbl,'','','','','','']);
    byM[m].forEach(function(r){
      rows.push([
        r.cliente,
        fmtDate(r.data),
        r.fattura||'',
        daysDiff(r.data),
        getSollecito(r)==='sollecitato'?'Sollecitato':'Da sollecitare',
        isLegale(r)?'SI':'NO',
        r.importo
      ]);
    });
    var mTot = byM[m].reduce(function(a,r){return a+r.importo;},0);
    rows.push(['TOTALE '+lbl.toUpperCase(),'','','','','',mTot]);
    rows.push(['','','','','','','']);
  });
  var tot = records.reduce(function(a,r){return a+r.importo;},0);
  rows.push(['TOTALE GENERALE','','','','','',tot]);

  if(typeof XLSX === 'undefined'){ alert('Libreria Excel non caricata. Verifica la connessione internet.'); return; }
  var ws = XLSX.utils.aoa_to_sheet(rows);
  ws['!cols'] = [{wch:30},{wch:12},{wch:12},{wch:12},{wch:16},{wch:8},{wch:14}];
  var wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Insoluti');
  var today = new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb, 'insoluti_'+today+'.xlsx');
  closeExportModal();
}

// POLLING AUTOMATICO ogni 30 secondi
var isPolling = false;
function pollSheets(){
  if(isPolling) return;
  isPolling = true;
  var sheets = ['sollecito','legale','pagati','note'];
  var results = {};
  var done = 0;
  sheets.forEach(function(sheet){
    fetch(API_URL + '?action=read&sheet=' + sheet)
      .then(function(r){ return r.json(); })
      .then(function(rows){
        results[sheet] = rows;
        done++;
        if(done === sheets.length){
          isPolling = false;
          var changed = false;
          var newLegale = {};
          (results.legale||[]).forEach(function(row){
            if(row.key && (row.valore === 'true' || row.valore === true)) newLegale[row.key] = true;
          });
          var newSoll = {};
          (results.sollecito||[]).forEach(function(row){
            if(row.key && row.valore) newSoll[row.key] = String(row.valore);
          });
          var newPaid = {};
          (results.pagati||[]).forEach(function(row){
            if(row.key && (row.valore === 'true' || row.valore === true)) newPaid[row.key] = true;
          });
          var newNote = {};
          (results.note||[]).forEach(function(row){
            if(row.key && row.valore) newNote[row.key] = String(row.valore);
          });
          if(JSON.stringify(newLegale) !== JSON.stringify(man.legaleSet)) changed = true;
          if(JSON.stringify(newSoll) !== JSON.stringify(man.sollecito)) changed = true;
          if(JSON.stringify(newPaid) !== JSON.stringify(man.paidSet)) changed = true;
          if(JSON.stringify(newNote) !== JSON.stringify(man.note)) changed = true;

          if(changed){
            man.legaleSet = newLegale;
            man.sollecito = newSoll;
            man.paidSet = newPaid;
            man.note = newNote;

            setSyncStatus('ok','Aggiornato da altro utente');
            setTimeout(function(){ setSyncStatus('ok','Sincronizzato'); }, 3000);
            renderSidebar();
            renderMain();
          }
        }
      })
      .catch(function(){ isPolling = false; setSyncStatus('error','Connessione persa'); });
  });
}
setInterval(pollSheets, 30000);
